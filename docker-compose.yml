services:
  quotesnap-backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: quotesnap-backend-v3

    ports:
      - "8000:8000"

    # ✅ LOAD .env PROPERLY
    env_file:
      - .env

    environment:
      # ------------------------------------------------------------------
      # CORE APP
      # ------------------------------------------------------------------
      FLASK_DEBUG: "false"
      LOG_LEVEL: INFO
      LOG_FILE: logs/app.log

      # ------------------------------------------------------------------
      # JWT AUTH (REQUIRED)
      # ------------------------------------------------------------------
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_HOURS: 24

      # ------------------------------------------------------------------
      # USERS / ROLES
      # ------------------------------------------------------------------
      COMPANY_GMAIL_ID: company_gmail_account

      # ------------------------------------------------------------------
      # DATABASE
      # ------------------------------------------------------------------
      DATABASE_URL: sqlite:///database/snapquote.db
      DUCKDB_PATH: database/snapquote.duckdb
      MOTHERDUCK_TOKEN: ${MOTHERDUCK_TOKEN}

      # ------------------------------------------------------------------
      # GMAIL
      # ------------------------------------------------------------------
      GMAIL_CREDENTIALS_FILE: credentials.json
      GMAIL_TOKEN_DIRECTORY: tokens
      EMAIL_CHECK_INTERVAL: 300
      MAX_EMAILS_PER_CHECK: 50

      # ------------------------------------------------------------------
      # OAUTH / FRONTEND
      # ------------------------------------------------------------------
      OAUTH_REDIRECT_URI: http://localhost:8000/api/admin/gmail/callback
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000

      # ------------------------------------------------------------------
      # OPENAI
      # ------------------------------------------------------------------
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-3.5-turbo

      # ------------------------------------------------------------------
      # FILE STORAGE
      # ------------------------------------------------------------------
      UPLOAD_FOLDER: uploads
      EXCEL_TEMPLATE_PATH: sample/QuotationFormat.xlsx

    volumes:
      # Persist database
      - ./database:/app/database

      # Persist Gmail / OAuth tokens
      - ./tokens:/app/tokens

      # Persist generated files
      - ./generated:/app/generated

      # Persist uploads
      - ./uploads:/app/uploads

      # Persist logs
      - ./logs:/app/logs

      # Mount Gmail credentials
      - ./credentials.json:/app/credentials.json:ro

      # Mount Excel template
      - ./sample/QuotationFormat.xlsx:/app/sample/QuotationFormat.xlsx:ro

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
