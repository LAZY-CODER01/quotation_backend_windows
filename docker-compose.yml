version: '3.8'

services:
  quotesnap-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quotesnap-backend
    ports:
      - "8000:8000"
    environment:
      # Flask Configuration
      - SECRET_KEY=${SECRET_KEY:-deployment-secret-key-change-in-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      
      # Gmail API Configuration
      - GMAIL_CREDENTIALS_FILE=${GMAIL_CREDENTIALS_FILE:-credentials.json}
      - GMAIL_TOKEN_DIRECTORY=${GMAIL_TOKEN_DIRECTORY:-tokens}
      
      # OpenAI Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      
      # Database Configuration
      - DATABASE_URL=${DATABASE_URL:-sqlite:///database/snapquote.db}
      - DUCKDB_PATH=${DUCKDB_PATH:-database/snapquote.duckdb}
      
      # Email Monitoring Configuration
      - EMAIL_CHECK_INTERVAL=${EMAIL_CHECK_INTERVAL:-300}
      - MAX_EMAILS_PER_CHECK=${MAX_EMAILS_PER_CHECK:-50}
      
      # OAuth Configuration
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-http://localhost:8000/api/auth/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      
      # Session Configuration
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE:-Lax}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      
      # File Storage
      - UPLOAD_FOLDER=${UPLOAD_FOLDER:-uploads}
      - EXCEL_TEMPLATE_PATH=${EXCEL_TEMPLATE_PATH:-sample/QuotationFormat.xlsx}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=${LOG_FILE:-logs/app.log}
    volumes:
      # Persist database
      - ./database:/app/database
      # Persist authentication tokens
      - ./tokens:/app/tokens
      # Persist generated files
      - ./generated:/app/generated
      # Persist uploads
      - ./uploads:/app/uploads
      # Persist logs
      - ./logs:/app/logs
      # Mount credentials file (if exists)
      - ./credentials.json:/app/credentials.json:ro
      # Mount template file
      - ./sample/QuotationFormat.xlsx:/app/sample/QuotationFormat.xlsx:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

